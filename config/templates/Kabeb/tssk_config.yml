################################################################################
##########                         GENERAL:                           ##########
################################################################################
debug: false

sonarr_url: 'http://localhost:8989'
sonarr_api_key: 'YOUR_SONARR_API_KEY'
sonarr_timeout: 90
use_tvdb: false

skip_unmonitored: true
ignore_finales_tags: ignorefinales
utc_offset: +0
simplify_next_week_dates: false

process_new_shows: true
process_new_season_soon: true
process_new_season_started: true
process_upcoming_episode: true
process_upcoming_finale: true
process_season_finale: true
process_final_episode: true
process_returning_shows: true
process_ended_shows: true
process_canceled_shows: true

################################################################################
##########                         NEW SHOW:                          ##########
################################################################################

recent_days_new_show: 14

collection_new_show:
  collection_name: "New Show"
  smart_label: added.desc
  sort_title: "+1_2New Shows"
  ignore_blank_results: true

backdrop_new_show:
  enable: true
  back_color: "#ff000095"
  back_height: 100
  back_width: 650
  horizontal_align: center
  horizontal_offset: 0
  vertical_align: bottom
  vertical_offset: 20
  back_radius: 25

text_new_show:
  use_text: "RECENTLY ADDED"
  horizontal_align: center
  horizontal_offset: 0
  vertical_align: bottom
  vertical_offset: 45
  font_size: 70
  font_color: "#FFFFFF"

################################################################################
##########                     NEW SEASON SOON:                       ##########
################################################################################

future_days_new_season: 31

collection_new_season:
  collection_name: "New Season Soon"
  smart_label: title.desc
  sort_title: "+1_2New Season Soon"
  ignore_blank_results: true
  item_label: New Season Soon
  non_item_remove_label: New Season Soon
  build_collection: false
  sync_mode: append

backdrop_new_season:
  enable: true
  back_color: "#00C6A495"
  back_height: 100
  back_width: 550
  horizontal_align: left
  horizontal_offset: 170
  vertical_align: top
  vertical_offset: 45
  back_radius: 25
  group: TSSK_backdrop
  weight: 25

text_new_season:
  date_format: "dd/mm"
  capitalize_dates: true
  use_text: "RETURNS"
  horizontal_align: left
  horizontal_offset: 190
  vertical_align: top
  vertical_offset: 70
  font_size: 70
  font_color: "#FFFFFF"
  group: TSSK_text
  weight: 25

