services:
  umtk:
    image: netplexflix/umtk:latest
    container_name: umtk
    ports:
      - "2120:2120" # Web UI
    environment:
      - CRON=0 2 * * * # Run daily at 2am
      - DOCKER=true
      - TZ=America/New_York # Set your timezone
      - PUID=1000 # Set to your user ID (run `id -u` in terminal)
      - PGID=1000 # Set to your group ID (run `id -g` in terminal)
    extra_hosts:
      - "host.docker.internal:host-gateway" # Alternative way to access host
    volumes:
      # Configuration directory (required)
      - ./config:/app/config

      # Video directory for placeholder method (optional - only needed if using method 2)
      - ./video:/video

      # Output directory for generated YAML files (required)
      - ./kometa:/app/kometa

      # UMTK root folders — one mount per umtk_root path configured in config.yml.
      # Each Radarr/Sonarr instance now has its own umtk_root, and the Trending
      # tile has its own trending_root_movies / trending_root_tv. Add a volume
      # mount here for every distinct root path you configure.
      - /your/actual/path:/umtkmovies #example: /mnt/media/umtk/movies:/umtkmovies
      - /your/actual/path:/umtktv #example: /mnt/media/umtk/tv:/umtktv
      # Additional instances (uncomment and adjust to match your config):
      # - /your/4k/movies/path:/umtkmovies4k
      # - /your/4k/tv/path:/umtktv4k

    restart: unless-stopped